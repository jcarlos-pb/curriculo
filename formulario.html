<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Currículo - José Carlos | Formulário</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

	<!-- Navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
		<div class="container">
			<a class="navbar-brand" href="#">Currículo</a>

			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="menu">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
					<li class="nav-item"><a class="nav-link" href="experiencia_profissional.html">Experiência</a></li>
					<li class="nav-item"><a class="nav-link" href="formacao_academica.html">Formação</a></li>
					<li class="nav-item"><a class="nav-link" href="resumo_profissional.html">Resumo</a></li>
					<li class="nav-item"><a class="nav-link active" href="formulario.html">Formulário</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<!-- Header -->
	<header class="container text-center mt-5">
		<h1 class="fw-bold">Formulário de Contato</h1>
		<p class="text-muted">Preencha seus dados</p>
	</header>

	<!-- Conteúdo -->
	<main class="container mt-4">

		<div class="card shadow-sm">
			<div class="card-body">
				<h2 class="card-title mb-4">Envie suas informações</h2>

				<form>

					<!-- Email -->
					<div class="mb-3">
						<label for="email" class="form-label">Email</label>
						<input type="email" class="form-control" id="email" placeholder="Digite seu email" required>
						<div class="form-text">Não compartilharemos seu email.</div>
					</div>

					<!-- Senha -->
					<div class="mb-3">
						<label for="senha" class="form-label">Senha</label>
						<input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
					</div>

					<!-- Contato -->
					<div class="mb-3">
						<label for="contato" class="form-label">Contato</label>
						<input type="text" class="form-control" id="contato" placeholder="Telefone ou outro contato" required>
					</div>

					<!-- Checkbox -->
					<div class="form-check mb-3">
						<input type="checkbox" class="form-check-input" id="check">
						<label class="form-check-label" for="check">Confirmo que os dados estão corretos</label>
					</div>

					<!-- Botão -->
					<button type="submit" class="btn btn-primary w-100">Enviar</button>

				</form>
			</div>
		</div>

	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
